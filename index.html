<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenue Dashboard · Hotel Bartos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<style>
  :root{
    --navy:#222D63;
    --navy-deep:#1A2050;
    --blue-mid:#5762A5;
    --orange:#E8533A;
    --salmon:#E7895E;
    --card:#2A3570;
    --card-border:#3A4580;
    --text-dim:#8090B0;
    --green-neon:#00FF88;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background: linear-gradient(160deg, var(--navy) 0%, var(--navy-deep) 100%);
    color:var(--white);
    min-height:100vh;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:32px 20px 64px;}

  header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:28px;border-bottom:1px solid var(--card-border);padding-bottom:20px;}
  header h1{font-size:28px;margin:0 0 4px;font-weight:700;}
  header .sub{color:var(--salmon);font-size:14px;letter-spacing:.03em;text-transform:uppercase;}
  .brand{font-size:12px;color:var(--text-dim);text-align:right;}

  .controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:28px;}
  .controls label{font-size:13px;color:var(--text-dim);}
  .controls input[type=date]{
    background:var(--card);border:1px solid var(--card-border);color:var(--white);
    padding:8px 12px;border-radius:8px;font-family:inherit;font-size:14px;
  }
  .controls button{
    background:var(--orange);color:var(--white);border:none;padding:9px 18px;
    border-radius:8px;font-weight:700;cursor:pointer;font-size:14px;
  }
  .controls button:hover{opacity:.9;}
  .meta-note{font-size:12px;color:var(--text-dim);}

  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px;}
  @media(max-width:800px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
  .kpi-card{
    background:var(--card);border:1px solid var(--card-border);border-radius:12px;
    padding:18px;position:relative;overflow:hidden;
  }
  .kpi-card .label{font-size:12.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .kpi-card .value{font-size:30px;font-weight:700;line-height:1.1;}
  .kpi-card .delta{font-size:13px;margin-top:6px;font-weight:700;}
  .delta.up{color:var(--green-neon);}
  .delta.down{color:var(--orange);}

  section{margin-bottom:36px;}
  h2{font-size:19px;margin:0 0 14px;font-weight:700;}
  h2 .tag{font-size:12px;color:var(--text-dim);font-weight:400;margin-left:8px;}

  .chart-box{
    background:var(--card);border:1px solid var(--card-border);border-radius:12px;
    padding:20px;height:340px;
  }

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{
    text-align:right;color:var(--text-dim);font-weight:600;font-size:12px;
    text-transform:uppercase;letter-spacing:.03em;padding:10px 8px;border-bottom:1px solid var(--card-border);
  }
  th:first-child, td:first-child{text-align:left;}
  td{padding:10px 8px;text-align:right;border-bottom:1px solid rgba(255,255,255,.06);}
  tr:hover td{background:rgba(255,255,255,.03);}
  .semaforo{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;}
  .semaforo.verde{background:var(--green-neon);}
  .semaforo.ambar{background:#FFC94A;}
  .semaforo.rojo{background:var(--orange);}
  .semaforo.na{background:#555;}
  .na-cell{color:#556;}
  .sub-valor{color:var(--text-dim);font-size:11.5px;font-weight:400;}

  .loading, .error{padding:60px 20px;text-align:center;color:var(--text-dim);}
  .error{color:var(--orange);}

  footer{margin-top:40px;font-size:12px;color:var(--text-dim);text-align:center;border-top:1px solid var(--card-border);padding-top:16px;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>Revenue Dashboard</h1>
      <div class="sub">Hotel Bartos · Almussafes, Valencia</div>
    </div>
    <div class="brand">The Revenue Run Rate<br>Daniel Pérez Rovira</div>
  </header>

  <div class="controls">
    <label for="fechaSnapshot">Fecha de snapshot (comparativa vs mismo día 2025 y 2024):</label>
    <input type="date" id="fechaSnapshot">
    <button id="btnActualizar">Actualizar</button>
    <label style="display:flex;align-items:center;gap:6px;">
      <input type="checkbox" id="chkNoCache">
      Forzar datos frescos (ignora caché de 6h)
    </label>
    <span class="meta-note" id="metaNote"></span>
  </div>

  <div id="app">
    <div class="loading">Cargando datos del snapshot…</div>
  </div>

  <footer>Revenue Dashboard Bartos · The Revenue Run Rate · Datos actualizados automáticamente desde Pick-Up 2024–2026</footer>
</div>

<script>
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbwAbLJjXNU6PCYvJk_6xSyGLU6GamtpHq-83kd95i6xeOExK72LaRoEBfe3qo8Ol9vmMw/exec';

const fmtEUR = n => n == null ? '—' : n.toLocaleString('es-ES',{style:'currency',currency:'EUR',maximumFractionDigits:0});
const fmtADR = n => n == null ? '—' : n.toLocaleString('es-ES',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct = n => n == null ? '—' : n.toLocaleString('es-ES',{maximumFractionDigits:1}) + '%';
const fmtNum = n => n == null ? '—' : Math.round(n).toLocaleString('es-ES');
const fmtDDMMYYYYtoInput = s => { if(!s) return ''; const [d,m,y]=s.split('/'); return `${y}-${m}-${d}`; };
const inputToDDMMYYYY = v => { const [y,m,d]=v.split('-'); return `${d}/${m}/${y}`; };

let chart2026vs2025;

function setDefaultDate(){
  const today = new Date();
  document.getElementById('fechaSnapshot').value = today.toISOString().slice(0,10);
}

async function cargarDatos(fechaDDMMYYYY, sinCache, mesPace){
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">Cargando datos del snapshot…</div>';
  try{
    const qs = new URLSearchParams();
    if(fechaDDMMYYYY) qs.set('fecha', fechaDDMMYYYY);
    if(sinCache) qs.set('nocache', '1');
    if(mesPace) qs.set('mesPace', String(mesPace));
    const url = PROXY_URL + (qs.toString() ? ('?' + qs.toString()) : '');
    const res = await fetch(url);
    const data = await res.json();
    if(!data.ok){ throw new Error(data.error || 'Error desconocido'); }
    if(typeof Chart === 'undefined'){
      throw new Error('La librería de gráficos (Chart.js) no se ha cargado desde el CDN. Revisa la conexión o si cdnjs.cloudflare.com está bloqueado en esta red.');
    }
    render(data);
  }catch(err){
    app.innerHTML = '<div class="error">No se han podido cargar los datos: ' + err.message + '</div>';
  }
}

function render(data){
  document.getElementById('metaNote').textContent =
    `Snapshot usado 2026: ${data.snapshotUsado2026 || '—'} · 2025: ${data.snapshotUsado2025 || '—'} · 2024: ${data.snapshotUsado2024 || '—'}`;

  const app = document.getElementById('app');
  app.innerHTML = `
    <section>
      <h2>KPIs YTD <span class="tag">acumulado meses cerrados, comparado con el mismo snapshot año anterior</span></h2>
      <div class="kpi-grid" id="kpiGrid"></div>
    </section>

    <section>
      <h2>Comparativa mensual 2026 vs 2025 vs 2024 <span class="tag">Revenue por mes</span></h2>
      <div class="chart-box"><canvas id="chartMensual"></canvas></div>
    </section>

    <section>
      <h2>Detalle mensual <span class="tag">semáforo = variación Revenue 2026 vs 2025</span></h2>
      <table id="tablaMensual">
        <thead>
          <tr>
            <th style="text-align:left;">Mes</th>
            <th>RN 2026</th><th>Occ 2026</th><th>ADR 2026</th><th>Revenue 2026</th><th>RevPAR 2026</th>
            <th>● Occ vs 2025</th>
            <th>● ADR vs 2025</th>
            <th>● Revenue vs 2025</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <p class="meta-note" style="margin-top:10px;">
        RevPAR se muestra como dato, sin semáforo propio: al ser Revenue dividido entre una capacidad fija (79 hab.), su variación % replica casi siempre la de Revenue.
      </p>
    </section>

    <section>
      <h2>Pick-up próximos 90 días <span class="tag">velocidad de reserva, proyección de cierre y erosión (cancelaciones) últimos 7 días</span></h2>
      <table id="tablaPickup">
        <thead>
          <tr>
            <th style="text-align:left;">Mes</th>
            <th>RN actual</th><th>Velocidad hab/día</th>
            <th>Días restantes</th><th>Proyección RN</th><th>Proyección Occ</th>
            <th>Pickup bruto 7d</th><th>● Erosión 7d</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <p class="meta-note" style="margin-top:10px;">
        Erosión = habitaciones perdidas por cancelación neta día a día (no solo el resultado final entre dos snapshots). Semáforo: verde si la cancelación es &lt;20% del movimiento bruto de la ventana, ámbar 20-40%, rojo &gt;40%.
      </p>
    </section>

    <section>
      <h2>Pace Index <span class="tag">ritmo de reserva 2026 vs 2025, a igual antelación respecto al inicio del mes</span></h2>
      <div class="controls" style="margin-bottom:16px;">
        <label for="selectorMesPace">Mes a analizar:</label>
        <select id="selectorMesPace"></select>
      </div>
      <div class="chart-box"><canvas id="chartPace"></canvas></div>
      <p class="meta-note" style="margin-top:10px;" id="paceNote"></p>
    </section>
  `;

  renderKPIs(data.ytd);
  renderChart(data.comparativaMensual);
  renderTablaMensual(data.comparativaMensual);
  renderPickup(data.pickup90);
  renderSelectorMesPace(data.mesPaceSeleccionado);
  renderPaceChart(data.paceCurve);
}

function renderSelectorMesPace(mesSeleccionado){
  const nombres = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const sel = document.getElementById('selectorMesPace');
  sel.innerHTML = nombres.map((n, i) => `<option value="${i+1}" ${i+1===mesSeleccionado?'selected':''}>${n}</option>`).join('');
  sel.onchange = () => {
    const v = document.getElementById('fechaSnapshot').value;
    const sinCache = document.getElementById('chkNoCache').checked;
    if(v) cargarDatos(inputToDDMMYYYY(v), sinCache, Number(sel.value));
  };
}

function renderKPIs(ytd){
  const grid = document.getElementById('kpiGrid');
  const items = [
    { label:'Ocupación YTD', v:ytd.y2026.occPct, prev:ytd.y2025.occPct, fmt:fmtPct, isPP:true },
    { label:'ADR medio YTD', v:ytd.y2026.adr, prev:ytd.y2025.adr, fmt:fmtADR },
    { label:'Revenue acumulado YTD', v:ytd.y2026.revenue, prev:ytd.y2025.revenue, fmt:fmtEUR },
    { label:'RevPAR YTD', v:ytd.y2026.revpar, prev:ytd.y2025.revpar, fmt:fmtEUR }
  ];
  grid.innerHTML = items.map(it => {
    let deltaHtml = '';
    if(it.prev != null && it.prev !== 0){
      const diff = it.isPP ? (it.v - it.prev) : ((it.v - it.prev) / it.prev * 100);
      const up = diff >= 0;
      const txt = it.isPP ? `${up?'+':''}${diff.toFixed(1)} pp vs 2025` : `${up?'+':''}${diff.toFixed(1)}% vs 2025`;
      deltaHtml = `<div class="delta ${up?'up':'down'}">${txt}</div>`;
    }
    return `<div class="kpi-card">
      <div class="label">${it.label}</div>
      <div class="value">${it.fmt(it.v)}</div>
      ${deltaHtml}
    </div>`;
  }).join('');
}

function renderChart(meses){
  const labels = meses.map(m => m.mesNombre);
  const rev2026 = meses.map(m => m.y2026 ? m.y2026.revenue : null);
  const rev2025 = meses.map(m => m.y2025 ? m.y2025.revenue : null);
  const rev2024 = meses.map(m => m.y2024 ? m.y2024.revenue : null);

  if(chart2026vs2025) chart2026vs2025.destroy();
  const ctx = document.getElementById('chartMensual').getContext('2d');
  chart2026vs2025 = new Chart(ctx, {
    type:'bar',
    data:{
      labels,
      datasets:[
        { label:'2024', data:rev2024, backgroundColor:'#5762A5' },
        { label:'2025', data:rev2025, backgroundColor:'#E7895E' },
        { label:'2026', data:rev2026, backgroundColor:'#00FF88' }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'#fff' } } },
      scales:{
        x:{ ticks:{ color:'#8090B0' }, grid:{ color:'rgba(255,255,255,.06)' } },
        y:{ ticks:{ color:'#8090B0', callback: v => (v/1000)+'k€' }, grid:{ color:'rgba(255,255,255,.06)' } }
      }
    }
  });
}

// Formatea "variación combinada": signo + magnitud principal, y el valor numérico entre paréntesis
function fmtCombinadoPct(pct, valor, fmtValor){
  if(pct == null || valor == null) return '<span class="na-cell">—</span>';
  const signo = pct >= 0 ? '+' : '';
  return `${signo}${pct.toFixed(1)}% <span class="sub-valor">(${signo}${fmtValor(Math.abs(valor)).replace('-','')})</span>`;
}
function fmtCombinadoPP(pp){
  if(pp == null) return '<span class="na-cell">—</span>';
  const signo = pp >= 0 ? '+' : '';
  return `${signo}${pp.toFixed(1)} pp`;
}

function renderTablaMensual(meses){
  const tbody = document.querySelector('#tablaMensual tbody');
  tbody.innerHTML = meses.map(m => {
    const y26 = m.y2026;
    const revenueValStr = m.varRevenueEUR != null ? (m.varRevenueEUR>=0?'+':'-') + fmtEUR(Math.abs(m.varRevenueEUR)) : null;
    const adrValStr = m.varADREUR != null ? (m.varADREUR>=0?'+':'-') + fmtADR(Math.abs(m.varADREUR)) : null;
    return `<tr>
      <td>${m.mesNombre}</td>
      <td>${y26 ? fmtNum(y26.rn) : '<span class="na-cell">—</span>'}</td>
      <td>${y26 ? fmtPct(y26.occPct) : '<span class="na-cell">—</span>'}</td>
      <td>${y26 ? fmtADR(y26.adr) : '<span class="na-cell">—</span>'}</td>
      <td>${y26 ? fmtEUR(y26.revenue) : '<span class="na-cell">—</span>'}</td>
      <td>${y26 ? fmtEUR(y26.revpar) : '<span class="na-cell">—</span>'}</td>
      <td><span class="semaforo ${m.semaforoOcc}"></span>${fmtCombinadoPP(m.varOccPP)}</td>
      <td><span class="semaforo ${m.semaforoADR}"></span>${m.varADRPct != null ? `${m.varADRPct>=0?'+':''}${m.varADRPct.toFixed(1)}% <span class="sub-valor">(${adrValStr})</span>` : '<span class="na-cell">—</span>'}</td>
      <td><span class="semaforo ${m.semaforoRevenue}"></span>${m.varRevenuePct != null ? `${m.varRevenuePct>=0?'+':''}${m.varRevenuePct.toFixed(1)}% <span class="sub-valor">(${revenueValStr})</span>` : '<span class="na-cell">—</span>'}</td>
    </tr>`;
  }).join('');
}

function renderPickup(rows){
  const tbody = document.querySelector('#tablaPickup tbody');
  if(!rows.length){
    tbody.innerHTML = '<tr><td colspan="8" class="na-cell">No hay meses futuros dentro de los próximos 90 días en este snapshot.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(r => `<tr>
    <td>${r.mesNombre}</td>
    <td>${fmtNum(r.rnActual)}</td>
    <td>${r.velocidadHabDia != null ? r.velocidadHabDia.toFixed(2) : '<span class="na-cell">—</span>'}</td>
    <td>${r.diasRestantesMes}</td>
    <td>${fmtNum(r.proyeccionRN)}</td>
    <td>${r.proyeccionOccPct != null ? fmtPct(r.proyeccionOccPct) : '<span class="na-cell">—</span>'}</td>
    <td>${r.pickupBrutoUlt7d != null ? '+' + fmtNum(r.pickupBrutoUlt7d) : '<span class="na-cell">—</span>'}</td>
    <td><span class="semaforo ${r.semaforoErosion}"></span>${r.erosionUlt7d != null ? fmtNum(r.erosionUlt7d) : '<span class="na-cell">—</span>'}</td>
  </tr>`).join('');
}

function renderPaceChart(curve){
  const note = document.getElementById('paceNote');
  if(!curve || !curve.length){
    document.getElementById('chartPace').getContext('2d').clearRect(0,0,9999,9999);
    note.textContent = 'No hay snapshots suficientes de este mes todavía para construir la curva de pace.';
    return;
  }

  const labels = curve.map(p => `${p.diasAntesDelMes}d`);
  const rn2026 = curve.map(p => p.rn2026);
  const rn2025 = curve.map(p => p.rn2025);

  if(window.chartPaceInstance) window.chartPaceInstance.destroy();
  const ctx = document.getElementById('chartPace').getContext('2d');
  window.chartPaceInstance = new Chart(ctx, {
    type:'line',
    data:{
      labels,
      datasets:[
        { label:'RN 2025 (misma antelación)', data:rn2025, borderColor:'#E7895E', backgroundColor:'transparent', tension:.25 },
        { label:'RN 2026', data:rn2026, borderColor:'#00FF88', backgroundColor:'transparent', tension:.25 }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ labels:{ color:'#fff' } } },
      scales:{
        x:{ title:{ display:true, text:'Días de antelación respecto al inicio del mes', color:'#8090B0' }, ticks:{ color:'#8090B0' }, grid:{ color:'rgba(255,255,255,.06)' } },
        y:{ title:{ display:true, text:'RN acumuladas', color:'#8090B0' }, ticks:{ color:'#8090B0' }, grid:{ color:'rgba(255,255,255,.06)' } }
      }
    }
  });

  const ultimo = curve[curve.length - 1];
  note.textContent = ultimo.paceIndex != null
    ? `Pace Index actual: ${ultimo.paceIndex}% (comparado con el snapshot 2025 de antelación más parecida: ${ultimo.fecha2025Comparada}, desfase de ${ultimo.desfaseDiasComparacion} día(s)). >100% = por delante del ritmo de 2025, <100% = por detrás.`
    : 'No hay snapshot 2025 comparable todavía para este mes.';
}

document.getElementById('btnActualizar').addEventListener('click', () => {
  const v = document.getElementById('fechaSnapshot').value;
  const sinCache = document.getElementById('chkNoCache').checked;
  if(v) cargarDatos(inputToDDMMYYYY(v), sinCache);
});

setDefaultDate();
cargarDatos(inputToDDMMYYYY(document.getElementById('fechaSnapshot').value), false);
</script>
</body>
</html>
